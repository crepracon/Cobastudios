<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coba Studios — Estimator Suite</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f0ed; color: #1a1a1a; min-height: 100vh; padding: 1.5rem 1rem 3rem; }
    .wrapper { max-width: 960px; margin: 0 auto; }

    .app-header { background: #1a1a1a; border-radius: 12px 12px 0 0; padding: 0.9rem 1.5rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
    .app-header h1 { font-size: 16px; font-weight: 700; color: #fff; }
    .app-header .sub { font-size: 11px; color: #777; margin-top: 1px; }

    .customer-bar { background: #fff; border-left: 1px solid #e0e0e0; border-right: 1px solid #e0e0e0; border-bottom: 2px solid #e0e0e0; padding: 0.8rem 1.25rem; }
    .customer-bar .cb-lbl { font-size: 10px; font-weight: 700; color: #aaa; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 5px; }
    .customer-bar .cb-grid { display: grid; grid-template-columns: 2fr 1.2fr 1.5fr; gap: 10px; }
    .customer-bar .cb-field label { display: block; font-size: 10px; color: #888; margin-bottom: 2px; }
    .customer-bar input { width: 100%; padding: 6px 8px; border: 1px solid #ddd; border-radius: 5px; font-size: 13px; font-family: inherit; color: #1a1a1a; background: #fafafa; }
    .customer-bar input:focus { outline: none; border-color: #999; background: #fff; }

    .tab-bar { display: flex; background: #252525; border-bottom: 1px solid #333; }
    .tab-btn { padding: 12px 22px; font-size: 13px; font-family: inherit; font-weight: 500; color: #888; background: transparent; border: none; cursor: pointer; border-bottom: 3px solid transparent; transition: color .15s, border-color .15s; display: flex; align-items: center; gap: 6px; }
    .tab-btn:hover { color: #ccc; }
    .tab-btn.active { color: #fff; border-bottom-color: #fff; }

    .tab-panel { display: none; background: #fff; border-radius: 0 0 12px 12px; }
    .tab-panel.active { display: block; }
    .panel-body { padding: 1.25rem; }

    .action-bar { background: #f5f5f2; border-top: 1px solid #e5e5e5; padding: .75rem 1.25rem; display: flex; gap: 8px; border-radius: 0 0 12px 12px; }
    .btn-dark { display: inline-flex; align-items: center; gap: 6px; background: #1a1a1a; color: #fff; border: none; border-radius: 6px; padding: 8px 16px; font-size: 13px; font-family: inherit; cursor: pointer; }
    .btn-dark:hover { background: #333; }
    .btn-light { display: inline-flex; align-items: center; gap: 6px; background: transparent; color: #888; border: 1px solid #ccc; border-radius: 6px; padding: 8px 14px; font-size: 13px; font-family: inherit; cursor: pointer; }
    .btn-light:hover { background: #f0f0ed; color: #333; }
    .btn-add { display: inline-flex; align-items: center; gap: 5px; background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; border-radius: 6px; padding: 6px 12px; font-size: 12px; font-family: inherit; cursor: pointer; margin-top: 6px; }
    .btn-add:hover { background: #dbeafe; }
    .btn-remove { background: transparent; color: #ccc; border: none; cursor: pointer; font-size: 15px; padding: 0 4px; line-height: 1; }
    .btn-remove:hover { color: #dc2626; }

    .field-label { display: block; font-size: 11px; color: #666; margin-bottom: 3px; }
    input[type=text], input[type=number], input[type=email], input[type=tel], select, textarea { width: 100%; padding: 7px 9px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; font-family: inherit; color: #1a1a1a; background: #fff; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #999; }
    textarea { resize: vertical; line-height: 1.5; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .divider { border: none; border-top: 1px solid #e5e5e5; margin: 1.25rem 0; }
    .sec-title { font-size: 13px; font-weight: 600; color: #1a1a1a; margin-bottom: .6rem; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

    table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; }
    th, td { border: 1px solid #e0e0e0; padding: 7px 8px; font-size: 13px; vertical-align: middle; }
    th.ph  { background: #fef3c7; color: #92400e; font-weight: 600; text-align: center; font-size: 12px; }
    th.prh { background: #dbeafe; color: #1e40af; font-weight: 600; text-align: center; font-size: 12px; }
    th.dh  { background: #dbeafe; color: #1e40af; font-weight: 600; text-align: center; font-size: 12px; }
    th.gh  { background: #dcfce7; color: #166534; font-weight: 600; text-align: center; font-size: 12px; }
    th.ivh { background: #f3e8ff; color: #6b21a8; font-weight: 600; text-align: center; font-size: 12px; }
    td.inp { background: #fef2f2; }
    td.inp input, td.inp select { width: 100%; padding: 5px 6px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; font-family: inherit; color: #1a1a1a; background: #fff; display: block; }
    td.inp input:focus, td.inp select:focus { outline: 2px solid #999; }
    td.res  { background: #f0fdf4; color: #166534; font-weight: 600; text-align: right; font-family: monospace; font-size: 13px; }
    td.resg { background: #f0fdf4; color: #166534; font-weight: 600; text-align: right; font-family: monospace; font-size: 13px; }
    td.dim  { color: #888 !important; font-weight: 400 !important; }
    tr.sub-row { background: #f5f5f2; }
    tr.sub-row td { font-weight: 600; }
    tr.grand-row { background: #f5f5f2; }
    tr.grand-row td { font-weight: 700; font-size: 14px; }
    td.iv-edit input { width: 100%; padding: 5px 6px; border: 1px solid #e5e5e5; border-radius: 4px; font-size: 13px; font-family: inherit; color: #1a1a1a; background: #fff; display: block; }
    td.iv-edit input:focus { outline: 2px solid #a855f7; border-color: #a855f7; }
    td.iv-edit { background: #faf5ff; }

    .cards4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 1.5rem; }
    .cards3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 1.5rem; }
    .card  { border-radius: 8px; padding: 1rem; text-align: center; border: 1px solid #e5e5e5; }
    .card.yourCost { background: #f5f5f2; border-color: #d1d5db; }
    .card.quote    { background: #f0fdf4; border-color: #bbf7d0; }
    .card.profit   { background: #f5f5f2; }
    .card.grand    { background: #fff; border: 2px solid #93c5fd; }
    .card-lbl { font-size: 11px; margin-bottom: 4px; }
    .card.yourCost .card-lbl { color: #666; }
    .card.quote    .card-lbl { color: #166534; }
    .card.profit   .card-lbl { color: #666; }
    .card.grand    .card-lbl { color: #1e40af; }
    .card-num { font-size: 20px; font-weight: 700; font-family: monospace; }
    .card.yourCost .card-num { color: #1a1a1a; }
    .card.quote    .card-num { color: #166534; }
    .card.profit   .card-num { color: #1a1a1a; }
    .card.grand    .card-num { font-size: 24px; color: #1a1a1a; }
    .card-sub { font-size: 10px; margin-top: 4px; }
    .card.yourCost .card-sub { color: #888; }
    .card.quote    .card-sub { color: #166534; }
    .card.profit   .card-sub { color: #666; }
    .card.grand    .card-sub { color: #1e40af; }

    .info-bar { background: #f5f5f2; border: 1px solid #e5e5e5; border-radius: 6px; padding: 10px 14px; display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 1rem; }
    .info-item { font-size: 12px; color: #666; }
    .info-item strong { color: #1a1a1a; }
    .rate-bar { background: #f5f5f2; border: 1px solid #e5e5e5; border-radius: 6px; padding: 10px 14px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 1.25rem; }
    .rate-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #666; }
    .rate-item input { width: 80px; }
    .rate-div { width: 1px; height: 22px; background: #ddd; }
    .profit-pill { display: inline-flex; align-items: center; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; margin-left: 4px; }

    .badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; margin-left: 4px; vertical-align: middle; }
    .badge-blue  { background: #dbeafe; color: #1e40af; }
    .badge-amber { background: #fef3c7; color: #92400e; }

    th.tier-hdr { background: #f5f5f2; font-size: 12px; font-weight: 600; text-align: center; color: #555; }
    tr.tier-active td { background: #fef3c7 !important; }
    tr.tier-active .tier-lbl-cell { font-weight: 700; color: #92400e; }
    .tier-inp { width: 100%; background: transparent; border: none; font-size: 13px; font-family: inherit; color: #1a1a1a; text-align: center; padding: 2px 4px; }
    .tier-inp:focus { outline: 1px solid #999; border-radius: 3px; background: #fff; }
    .tier-name-inp { width: 100%; background: transparent; border: none; font-size: 13px; font-family: inherit; color: #1a1a1a; padding: 2px 4px; }
    .tier-name-inp:focus { outline: 1px solid #999; border-radius: 3px; background: #fff; }
    .active-pill { display: inline-flex; align-items: center; background: #fef3c7; color: #92400e; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }

    .toggle-btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 500; font-family: inherit; cursor: pointer; border: 1px solid #ddd; transition: all .15s; }
    .toggle-btn.on  { background: #f0fdf4; color: #166534; border-color: #bbf7d0; }
    .toggle-btn.off { background: #f5f5f2; color: #888; }
    .min-bar { border: 1px solid #e5e5e5; border-radius: 6px; padding: 10px 14px; margin-bottom: 1rem; font-size: 12px; font-weight: 500; }
    .ship-note { font-size: 11px; margin-top: 3px; }
    .scroll-x { overflow-x: auto; }

    #p-coil-row td { vertical-align: top; padding-top: 9px; }

    .lam-section { background: #fff7ed; border: 1px solid #fed7aa; border-radius: 8px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
    .lam-section-title { font-size: 13px; font-weight: 700; color: #c2410c; margin-bottom: .6rem; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .lam-toggle { display: inline-flex; align-items: center; gap: 7px; cursor: pointer; font-size: 13px; font-weight: 500; color: #c2410c; user-select: none; }
    .lam-toggle input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; accent-color: #ea580c; }
    th.lh { background: #fed7aa; color: #c2410c; font-weight: 600; text-align: center; font-size: 12px; }
    td.lam-res { background: #fff7ed; color: #c2410c; font-weight: 600; text-align: right; font-family: monospace; font-size: 13px; }

    .inv-section { background: #faf5ff; border: 1px solid #e9d5ff; border-radius: 8px; padding: 1rem 1.25rem; margin-bottom: 1.5rem; }
    .inv-section-title { font-size: 13px; font-weight: 700; color: #6b21a8; margin-bottom: .75rem; display: flex; align-items: center; gap: 8px; }
    .inv-save-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 600; }
    .inv-save-badge.saved   { background: #f0fdf4; color: #166534; }
    .inv-save-badge.saving  { background: #fef3c7; color: #92400e; }

    @media print {
      body { background: #fff; padding: 0; }
      .tab-bar, .action-bar, .no-print { display: none !important; }
      .tab-panel { display: block !important; border-radius: 0; }
      .tab-panel:not(.active) { display: none !important; }
      .app-header { background: #fff; border-radius: 0; }
      .app-header h1 { color: #1a1a1a; }
      td.inp, td.iv-edit { background: #fff; }
      td.res, td.resg { background: #fff; }
      tr.sub-row, tr.grand-row { background: #f5f5f2; }
      input, select, textarea { border: none; padding: 0; background: transparent; }
      .customer-bar { border: none; border-bottom: 1px solid #ddd; }
    }
    @media (max-width: 680px) {
      .two-col { grid-template-columns: 1fr; }
      .cards4  { grid-template-columns: 1fr 1fr; }
      .cards3  { grid-template-columns: 1fr; }
      .tab-btn { padding: 10px 12px; font-size: 12px; }
      .customer-bar .cb-grid { grid-template-columns: 1fr; }
    }
    .jobs-toolbar { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:1.2rem; }
    .jobs-toolbar input[type=text] { flex:1; min-width:200px; padding:9px 12px; border:1px solid #ddd; border-radius:6px; font-size:14px; font-family:inherit; }
    .jobs-btn { padding:9px 14px; font-size:13px; font-family:inherit; font-weight:500; border:1px solid #ddd; border-radius:6px; background:#fff; cursor:pointer; }
    .jobs-btn:hover { background:#f5f5f2; }
    .cb-save-btn { padding:9px 16px; font-size:13px; font-family:inherit; font-weight:600; border:none; border-radius:6px; background:#2f6f4f; color:#fff; cursor:pointer; white-space:nowrap; }
    .cb-save-btn:hover { background:#255c40; }
    .jobs-cust { border:1px solid #e5e5e5; border-radius:8px; background:#fff; margin-bottom:14px; overflow:hidden; }
    .jobs-cust-head { display:flex; justify-content:space-between; align-items:center; gap:10px; padding:12px 16px; cursor:pointer; background:#fafaf8; }
    .jobs-cust-head:hover { background:#f2f2ee; }
    .jobs-cust-name { font-weight:600; font-size:15px; }
    .jobs-cust-meta { font-size:12px; color:#888; }
    .jobs-cust-body { padding:12px 16px; border-top:1px solid #eee; display:none; }
    .jobs-cust.open .jobs-cust-body { display:block; }
    .jobs-cust-notes { width:100%; box-sizing:border-box; padding:8px 10px; border:1px solid #ddd; border-radius:6px; font-size:13px; font-family:inherit; margin-bottom:10px; }
    .jobs-est { display:flex; flex-wrap:wrap; align-items:center; gap:8px 12px; padding:10px 12px; border:1px solid #eee; border-radius:6px; margin-bottom:8px; background:#fff; }
    .jobs-est-title { font-weight:600; font-size:14px; }
    .jobs-est-meta { font-size:12px; color:#888; }
    .jobs-est-total { font-weight:600; font-size:14px; margin-left:auto; }
    .jobs-status { padding:5px 8px; font-size:12px; font-family:inherit; border:1px solid #ddd; border-radius:5px; background:#fff; }
    .jobs-status.st-quote { background:#fff8e6; border-color:#e6d9a8; }
    .jobs-status.st-approved { background:#e9f3ff; border-color:#b8d4f0; }
    .jobs-status.st-production { background:#f3e9ff; border-color:#d4bcf0; }
    .jobs-status.st-done { background:#e9f7ee; border-color:#b5ddc3; }
    .jobs-mini { padding:5px 10px; font-size:12px; font-family:inherit; border:1px solid #ddd; border-radius:5px; background:#fff; cursor:pointer; }
    .jobs-mini:hover { background:#f5f5f2; }
    .jobs-mini.danger { color:#b33; border-color:#e0bcbc; }
    .jobs-empty { color:#999; font-size:14px; padding:2rem 0; text-align:center; }
    #jobs-toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#222; color:#fff; padding:10px 20px; border-radius:8px; font-size:14px; display:none; z-index:999; }
    @media (max-width:600px){ .jobs-est-total { margin-left:0; width:100%; } }
  </style>
</head>
<body>
<div class="wrapper">
  <div class="app-header">
    <div>
      <h1>Coba Studios — Estimator Suite</h1>
      <div class="sub">Full estimator restoring — please stand by</div>
    </div>
  </div>
  <div style="padding:2rem;background:#fff">
    <p><strong>Restoring the full estimator now.</strong> This is an intermediate safe checkpoint — one more push follows immediately with the complete tool.</p>
  </div>
</div>
</body>
</html>
